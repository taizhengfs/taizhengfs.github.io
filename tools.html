<style>
.tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-top: 32px;
}

.tool-card {
    position: relative;
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    text-decoration: none;
    display: block;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.04);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.tool-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #10b981, #34d399);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
}

.tool-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(16, 185, 129, 0.15);
    text-decoration: none;
}

.tool-card:hover::before {
    transform: scaleX(1);
}

.tool-card .icon-wrapper {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
}

.tool-card .icon-wrapper svg {
    width: 32px;
    height: 32px;
    color: #059669;
}

.tool-card h3 {
    margin: 0 0 12px 0;
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
    letter-spacing: -0.02em;
}

.tool-card:hover h3 {
    color: #059669;
}

.tool-card p {
    margin: 0 0 16px 0;
    color: #64748b;
    font-size: 14px;
    line-height: 1.6;
}

.tool-card .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: #f0fdf4;
    color: #15803d;
    font-size: 12px;
    font-weight: 500;
    border-radius: 20px;
}

.tool-card .arrow {
    position: absolute;
    right: 24px;
    bottom: 24px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.tool-card .arrow svg {
    width: 18px;
    height: 18px;
    color: #94a3b8;
    transition: all 0.3s ease;
}

.tool-card:hover .arrow {
    background: #10b981;
}

.tool-card:hover .arrow svg {
    color: #fff;
    transform: translateX(2px);
}

/* Coming Soon 样式 */
.tool-card.coming-soon {
    opacity: 0.65;
    cursor: default;
}

.tool-card.coming-soon::before {
    background: linear-gradient(90deg, #94a3b8, #cbd5e1);
}

.tool-card.coming-soon .icon-wrapper {
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
}

.tool-card.coming-soon .icon-wrapper svg {
    color: #94a3b8;
}

.tool-card.coming-soon .tag {
    background: #f1f5f9;
    color: #64748b;
}

.tool-card.coming-soon:hover {
    transform: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}

.tool-card.coming-soon:hover::before {
    transform: scaleX(0);
}

.tool-card.coming-soon:hover h3 {
    color: #1e293b;
}

.intro-text {
    font-size: 16px;
    color: #64748b;
    line-height: 1.8;
}

@media (max-width: 640px) {
    .tools-grid {
        grid-template-columns: 1fr;
    }
}
</style>
