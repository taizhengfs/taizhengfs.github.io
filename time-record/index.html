<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 保姆工时记录 - Warden's Life</title>
    <!-- 引入 Tailwind CSS 进行样式渲染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 自定义滚动条，更美观 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .slot-btn { transition: all 0.2s ease; }
        .slot-active { background-color: #10b981; color: white; border-color: #10b981; }
        .slot-inactive { background-color: #f8fafc; color: #cbd5e1; border-color: #e2e8f0; }
        .slot-inactive:hover { background-color: #f1f5f9; color: #94a3b8; }
        
        .sync-indicator { transition: all 0.3s ease; }
        .sync-success { color: #10b981; }
        .sync-error { color: #ef4444; }
        .sync-pending { color: #f59e0b; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 1s linear infinite; }
        
        /* 设置面板 */
        .settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .settings-panel.open {
            max-height: 300px;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- 顶部固定导航栏 -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3">
                <a href="/" class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 hover:bg-emerald-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </a>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 leading-tight">2026 保姆工时记录</h1>
                    <p class="text-xs text-slate-500 font-medium">Nanny Work Log</p>
                </div>
            </div>

            <div class="flex items-center gap-4 sm:gap-8 bg-slate-100 px-5 py-2 rounded-full border border-slate-200">
                <div class="text-center sm:text-right">
                    <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">年度总支出</div>
                    <div class="text-lg font-bold text-emerald-600" id="total-year-income">¥ 0</div>
                </div>
                <div class="w-px h-8 bg-slate-300 hidden sm:block"></div>
                <div class="text-center sm:text-left hidden sm:block">
                    <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">总工时(半天)</div>
                    <div class="text-lg font-bold text-slate-700" id="total-year-count">0</div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <!-- 同步状态指示器 -->
                <div id="sync-status" class="flex items-center gap-1 text-xs sync-indicator">
                    <span id="sync-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </span>
                    <span id="sync-text">本地</span>
                </div>
                
                <!-- 设置按钮 -->
                <button onclick="toggleSettings()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="设置">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>
        
        <!-- 设置面板 (默认隐藏) -->
        <div id="settings-panel" class="settings-panel border-t border-slate-100 bg-slate-50/50">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 价格设置 -->
                    <div class="bg-white p-4 rounded-lg border border-slate-200">
                        <label class="text-xs text-slate-500 font-medium block mb-2">💰 单价设置</label>
                        <div class="flex items-center gap-2">
                            <input type="number" id="price-input" value="150" class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500" onchange="updatePrice(this.value)">
                            <span class="text-sm text-slate-400">元/半天</span>
                        </div>
                    </div>
                    
                    <!-- GitHub Gist 同步设置 -->
                    <div class="bg-white p-4 rounded-lg border border-slate-200">
                        <label class="text-xs text-slate-500 font-medium block mb-2">☁️ GitHub Gist 云同步</label>
                        <div class="space-y-2">
                            <input type="password" id="gist-token" placeholder="GitHub Personal Access Token" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            <input type="text" id="gist-id" placeholder="Gist ID (留空自动创建)" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            <div class="flex gap-2">
                                <button onclick="connectGist()" class="flex-1 px-3 py-2 text-sm bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors">连接 Gist</button>
                                <button onclick="syncNow()" class="px-3 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">立即同步</button>
                            </div>
                            <p class="text-[10px] text-slate-400">
                                <a href="https://github.com/settings/tokens/new?scopes=gist&description=Time-Record-Sync" target="_blank" class="text-emerald-600 hover:underline">点此创建 Token</a> (需勾选 gist 权限)
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 月份卡片将通过 JS 插入这里 -->
            <div class="col-span-full text-center py-20 text-slate-400 animate-pulse">
                正在加载数据...
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-400 text-xs border-t border-slate-200 bg-white">
        <p id="storage-info">数据已自动保存至本地浏览器 (IndexedDB)</p>
        <p class="mt-1">
            <a href="/" class="text-emerald-600 hover:underline">← 返回博客首页</a>
        </p>
    </footer>

    <!-- 逻辑脚本 -->
    <script>
        // --- 配置与状态 ---
        const YEAR = 2026;
        const DB_NAME = 'NannyTracker2026';
        const STORE_NAME = 'records';
        const GIST_FILENAME = 'nanny-tracker-2026.json';
        
        let db;
        let pricePerSession = 150;
        let workData = {}; // 内存中的数据缓存 { "2026-01-01-am": true }
        
        // Gist 配置
        let gistToken = '';
        let gistId = '';
        let isGistConnected = false;
        let syncTimeout = null;

        // --- 设置面板 ---
        window.toggleSettings = () => {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('open');
        };

        // --- IndexedDB 数据库操作 ---
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = (e) => console.error("Database error", e);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
            });
        };

        const loadRecords = () => {
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const objectStore = transaction.objectStore(STORE_NAME);
                const request = objectStore.getAll();
                request.onsuccess = (e) => {
                    const result = e.target.result;
                    const map = {};
                    result.forEach(item => map[item.id] = item.active);
                    resolve(map);
                };
            });
        };

        const saveRecord = (id, active) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const objectStore = transaction.objectStore(STORE_NAME);
            objectStore.put({ id, active });
        };
        
        const saveAllRecords = async (data) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const objectStore = transaction.objectStore(STORE_NAME);
            // 清除旧数据
            objectStore.clear();
            // 写入新数据
            for (const [id, active] of Object.entries(data)) {
                if (active) {
                    objectStore.put({ id, active });
                }
            }
        };

        // --- GitHub Gist 云同步 ---
        
        const updateSyncStatus = (status, text) => {
            const statusEl = document.getElementById('sync-status');
            const iconEl = document.getElementById('sync-icon');
            const textEl = document.getElementById('sync-text');
            const storageInfo = document.getElementById('storage-info');
            
            statusEl.className = `flex items-center gap-1 text-xs sync-indicator sync-${status}`;
            textEl.textContent = text;
            
            if (status === 'pending') {
                iconEl.innerHTML = '<svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>';
            } else if (status === 'success') {
                iconEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                storageInfo.textContent = '数据已同步至 GitHub Gist ☁️';
            } else if (status === 'error') {
                iconEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            }
        };
        
        // 连接到 Gist
        window.connectGist = async () => {
            const token = document.getElementById('gist-token').value.trim();
            const id = document.getElementById('gist-id').value.trim();
            
            if (!token) {
                alert('请输入 GitHub Personal Access Token');
                return;
            }
            
            gistToken = token;
            updateSyncStatus('pending', '连接中...');
            
            try {
                if (id) {
                    // 尝试获取已有的 Gist
                    gistId = id;
                    await loadFromGist();
                } else {
                    // 创建新的 Gist
                    await createGist();
                }
                
                // 保存配置到 localStorage
                localStorage.setItem('gist_token', gistToken);
                localStorage.setItem('gist_id', gistId);
                
                isGistConnected = true;
                updateSyncStatus('success', '已连接');
                document.getElementById('gist-id').value = gistId;
                
                alert('✅ Gist 连接成功！\n\nGist ID: ' + gistId + '\n\n请保存此 ID，以便在其他设备上同步数据。');
            } catch (error) {
                console.error('Gist 连接失败:', error);
                updateSyncStatus('error', '连接失败');
                alert('连接失败: ' + error.message);
            }
        };
        
        // 创建新的 Gist
        const createGist = async () => {
            const response = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${gistToken}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    description: '2026 保姆工时记录数据 - Nanny Tracker',
                    public: false,
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify({
                                workData: workData,
                                pricePerSession: pricePerSession,
                                lastSync: new Date().toISOString()
                            }, null, 2)
                        }
                    }
                })
            });
            
            if (!response.ok) {
                throw new Error('创建 Gist 失败');
            }
            
            const data = await response.json();
            gistId = data.id;
        };
        
        // 从 Gist 加载数据
        const loadFromGist = async () => {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: {
                    'Authorization': `token ${gistToken}`,
                }
            });
            
            if (!response.ok) {
                throw new Error('获取 Gist 失败');
            }
            
            const data = await response.json();
            const fileContent = data.files[GIST_FILENAME]?.content;
            
            if (fileContent) {
                const parsed = JSON.parse(fileContent);
                
                // 合并云端数据与本地数据 (云端优先)
                workData = { ...workData, ...parsed.workData };
                
                if (parsed.pricePerSession) {
                    pricePerSession = parsed.pricePerSession;
                    document.getElementById('price-input').value = pricePerSession;
                }
                
                // 保存到本地 IndexedDB
                await saveAllRecords(workData);
                
                // 重新渲染
                renderCalendar();
                updateStats();
            }
        };
        
        // 保存到 Gist
        const saveToGist = async () => {
            if (!isGistConnected || !gistToken || !gistId) return;
            
            updateSyncStatus('pending', '同步中...');
            
            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${gistToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify({
                                    workData: workData,
                                    pricePerSession: pricePerSession,
                                    lastSync: new Date().toISOString()
                                }, null, 2)
                            }
                        }
                    })
                });
                
                if (!response.ok) {
                    throw new Error('保存失败');
                }
                
                updateSyncStatus('success', '已同步');
            } catch (error) {
                console.error('同步失败:', error);
                updateSyncStatus('error', '同步失败');
            }
        };
        
        // 防抖同步
        const debouncedSync = () => {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                saveToGist();
            }, 2000); // 2秒后同步
        };
        
        // 立即同步
        window.syncNow = async () => {
            if (!isGistConnected) {
                alert('请先连接 Gist');
                return;
            }
            await saveToGist();
        };

        // --- 业务逻辑 ---

        // 初始化
        async function init() {
            // 1. 恢复价格设置
            const savedPrice = localStorage.getItem('nanny_price');
            if (savedPrice) {
                pricePerSession = parseInt(savedPrice);
                document.getElementById('price-input').value = pricePerSession;
            }
            
            // 2. 恢复 Gist 配置
            const savedToken = localStorage.getItem('gist_token');
            const savedGistId = localStorage.getItem('gist_id');
            if (savedToken && savedGistId) {
                gistToken = savedToken;
                gistId = savedGistId;
                document.getElementById('gist-token').value = savedToken;
                document.getElementById('gist-id').value = savedGistId;
            }

            // 3. 初始化数据库并加载本地数据
            await initDB();
            workData = await loadRecords();

            // 4. 渲染界面
            renderCalendar();
            updateStats();
            
            // 5. 如果已配置 Gist，自动连接并同步
            if (gistToken && gistId) {
                try {
                    updateSyncStatus('pending', '同步中...');
                    await loadFromGist();
                    isGistConnected = true;
                    updateSyncStatus('success', '已同步');
                } catch (error) {
                    console.error('自动同步失败:', error);
                    updateSyncStatus('error', '同步失败');
                }
            }
        }

        // 修改价格
        window.updatePrice = (val) => {
            pricePerSession = parseInt(val) || 0;
            localStorage.setItem('nanny_price', pricePerSession);
            updateStats(); // 重新计算总价
            renderMonthlyStats(); // 重新计算每个月的总价
            debouncedSync(); // 触发云同步
        };

        // 切换状态 (核心功能)
        window.toggleSlot = (dateStr, type, btnElement) => {
            const key = `${dateStr}-${type}`;
            const isActive = !workData[key]; // 取反
            
            // 更新内存
            workData[key] = isActive;
            
            // 更新本地数据库
            saveRecord(key, isActive);
            
            // 触发云同步
            debouncedSync();

            // 更新 UI 样式
            if (isActive) {
                btnElement.classList.remove('slot-inactive');
                btnElement.classList.add('slot-active');
            } else {
                btnElement.classList.remove('slot-active');
                btnElement.classList.add('slot-inactive');
            }

            // 更新统计
            updateStats();
            // 更新该月的统计
            const monthIndex = parseInt(dateStr.split('-')[1]) - 1;
            updateMonthStat(monthIndex);
        };

        // 计算并更新全局统计
        function updateStats() {
            let count = 0;
            for (let key in workData) {
                if (workData[key] === true) count++;
            }
            const total = count * pricePerSession;
            
            document.getElementById('total-year-income').innerText = `¥ ${total.toLocaleString()}`;
            document.getElementById('total-year-count').innerText = count;
        }

        // 更新单月统计
        function updateMonthStat(monthIndex) {
            const monthStr = String(monthIndex + 1).padStart(2, '0');
            let count = 0;
            // 遍历该月所有可能的日期
            for (let d = 1; d <= 31; d++) {
                const dayStr = String(d).padStart(2, '0');
                const dateStr = `${YEAR}-${monthStr}-${dayStr}`;
                if (workData[`${dateStr}-am`]) count++;
                if (workData[`${dateStr}-pm`]) count++;
            }
            const total = count * pricePerSession;
            const el = document.getElementById(`month-total-${monthIndex}`);
            if (el) el.innerText = `¥${total}`;
        }

        function renderMonthlyStats() {
            for(let i=0; i<12; i++) updateMonthStat(i);
        }

        // 渲染日历网格
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = ''; // 清空

            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];

            for (let m = 0; m < 12; m++) {
                const daysInMonth = new Date(YEAR, m + 1, 0).getDate();
                const startDay = new Date(YEAR, m, 1).getDay(); // 0是周日

                // 创建月份卡片
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden flex flex-col";

                // 卡片头部
                card.innerHTML = `
                    <div class="px-4 py-3 border-b border-slate-50 flex justify-between items-baseline bg-slate-50/50">
                        <h3 class="font-bold text-slate-700">${monthNames[m]}</h3>
                        <div class="text-xs font-mono text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded font-bold" id="month-total-${m}">¥0</div>
                    </div>
                    <div class="p-4 flex-1">
                        <div class="grid grid-cols-7 mb-2 text-center">
                            ${['日','一','二','三','四','五','六'].map(d => `<span class="text-[10px] text-slate-400 font-medium">${d}</span>`).join('')}
                        </div>
                        <div class="grid grid-cols-7 gap-y-3 gap-x-1" id="days-container-${m}">
                            <!-- Days will go here -->
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
                
                const daysContainer = document.getElementById(`days-container-${m}`);

                // 填充空白
                for (let i = 0; i < startDay; i++) {
                    const empty = document.createElement('div');
                    daysContainer.appendChild(empty);
                }

                // 填充日期
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${YEAR}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    
                    const isAmActive = !!workData[`${dateStr}-am`];
                    const isPmActive = !!workData[`${dateStr}-pm`];

                    const dayWrapper = document.createElement('div');
                    dayWrapper.className = "flex flex-col items-center group";
                    
                    dayWrapper.innerHTML = `
                        <span class="text-[10px] text-slate-400 mb-1 font-medium">${d}</span>
                        <div class="flex w-full max-w-[40px] h-6 rounded-md overflow-hidden border border-slate-100 shadow-sm cursor-pointer">
                            <button 
                                onclick="toggleSlot('${dateStr}', 'am', this)"
                                class="slot-btn flex-1 h-full flex items-center justify-center text-[8px] font-bold ${isAmActive ? 'slot-active' : 'slot-inactive'}"
                            >上</button>
                            <div class="w-px bg-white/20 z-10 relative"></div>
                            <button 
                                onclick="toggleSlot('${dateStr}', 'pm', this)"
                                class="slot-btn flex-1 h-full flex items-center justify-center text-[8px] font-bold ${isPmActive ? 'slot-active' : 'slot-inactive'}"
                            >下</button>
                        </div>
                    `;
                    daysContainer.appendChild(dayWrapper);
                }
            }
            
            // 初始计算一次所有月份金额
            renderMonthlyStats();
        }

        // 启动
        init();
    </script>
</body>
</html>
