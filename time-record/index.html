<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 保姆工时记录 - Warden's Life</title>
    <!-- 引入 Tailwind CSS 进行样式渲染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* 自定义滚动条，更美观 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .slot-btn { transition: all 0.2s ease; }
        .slot-active { background-color: #10b981; color: white; border-color: #10b981; }
        .slot-inactive { background-color: #f8fafc; color: #cbd5e1; border-color: #e2e8f0; }
        .slot-inactive:hover { background-color: #f1f5f9; color: #94a3b8; }
        
        .sync-indicator { transition: all 0.3s ease; }
        .sync-success { color: #10b981; }
        .sync-error { color: #ef4444; }
        .sync-pending { color: #f59e0b; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 1s linear infinite; }
        
        /* Toast 通知 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* 分享弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>
    
    <!-- 分享弹窗 -->
    <div id="share-modal" class="modal-overlay" onclick="if(event.target === this) closeShareModal()">
        <div class="modal-content">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-slate-800">分享给家人</h3>
                    <p class="text-sm text-slate-500">发送链接即可共享数据</p>
                </div>
            </div>
            <div class="bg-slate-50 rounded-xl p-4 mb-4">
                <input type="text" id="share-link" readonly class="w-full bg-transparent text-sm text-slate-600 outline-none" onclick="this.select()">
            </div>
            <div class="flex gap-3">
                <button onclick="copyShareLink()" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-medium hover:bg-emerald-600 transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    复制链接
                </button>
                <button onclick="closeShareModal()" class="px-6 py-3 border border-slate-200 rounded-xl font-medium hover:bg-slate-50 transition-colors">关闭</button>
            </div>
        </div>
    </div>

    <!-- 顶部固定导航栏 -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3">
                <a href="/" class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 hover:bg-emerald-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </a>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 leading-tight">2026 保姆工时记录</h1>
                    <p class="text-xs text-slate-500 font-medium">Nanny Work Log</p>
                </div>
            </div>

            <div class="flex items-center gap-4 sm:gap-8 bg-slate-100 px-5 py-2 rounded-full border border-slate-200">
                <div class="text-center sm:text-right">
                    <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">年度总支出</div>
                    <div class="text-lg font-bold text-emerald-600" id="total-year-income">¥ 0</div>
                </div>
                <div class="w-px h-8 bg-slate-300 hidden sm:block"></div>
                <div class="text-center sm:text-left hidden sm:block">
                    <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">总工时(半天)</div>
                    <div class="text-lg font-bold text-slate-700" id="total-year-count">0</div>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <!-- 同步状态指示器 -->
                <div id="sync-status" class="flex items-center gap-1 text-xs sync-indicator sync-pending">
                    <span id="sync-icon">
                        <svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </span>
                    <span id="sync-text">连接中...</span>
                </div>
                
                <!-- 单价设置 -->
                <div class="flex items-center gap-1 ml-2">
                    <span class="text-xs text-slate-400">¥</span>
                    <input type="number" id="price-input" value="150" class="w-12 px-1 py-1 text-sm border border-slate-200 rounded focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center" onchange="updatePrice(this.value)">
                    <span class="text-xs text-slate-400">/半天</span>
                </div>
                
                <!-- 分享按钮 -->
                <button onclick="showShareModal()" class="ml-2 p-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors" title="分享给家人">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
                
                <!-- 刷新按钮 -->
                <button onclick="refreshData()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="刷新数据">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-500"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 月份卡片将通过 JS 插入这里 -->
            <div class="col-span-full text-center py-20 text-slate-400 animate-pulse">
                正在加载数据...
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-400 text-xs border-t border-slate-200 bg-white">
        <p id="storage-info">☁️ 数据自动云端同步，所有设备实时共享</p>
        <p class="mt-1">
            <a href="/" class="text-emerald-600 hover:underline">← 返回博客首页</a>
        </p>
    </footer>

    <!-- 逻辑脚本 -->
    <script>
        // --- 配置与状态 ---
        const YEAR = 2026;
        
        // Cloudflare Worker 存储服务（自定义域名，国内可访问）
        const API_BASE = 'https://time.taizhendong.com';
        
        let binId = null;
        let pricePerSession = 150;
        let workData = {}; // 内存中的数据缓存 { "2026-01-01-am": true }
        let syncTimeout = null;
        let isSyncing = false;

        // --- UI 工具函数 ---
        
        // 显示 Toast 通知
        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }
        
        // 更新同步状态
        const updateSyncStatus = (status, text) => {
            const statusEl = document.getElementById('sync-status');
            const iconEl = document.getElementById('sync-icon');
            const textEl = document.getElementById('sync-text');
            
            statusEl.className = `flex items-center gap-1 text-xs sync-indicator sync-${status}`;
            textEl.textContent = text;
            
            if (status === 'pending') {
                iconEl.innerHTML = '<svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>';
            } else if (status === 'success') {
                iconEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
            } else if (status === 'error') {
                iconEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            }
        };
        
        // 显示分享弹窗
        window.showShareModal = () => {
            const shareLink = `${window.location.origin}${window.location.pathname}?id=${binId}`;
            document.getElementById('share-link').value = shareLink;
            document.getElementById('share-modal').classList.add('show');
        };
        
        // 关闭分享弹窗
        window.closeShareModal = () => {
            document.getElementById('share-modal').classList.remove('show');
        };
        
        // 复制分享链接
        window.copyShareLink = async () => {
            const link = document.getElementById('share-link').value;
            try {
                await navigator.clipboard.writeText(link);
                showToast('✅ 链接已复制，发给家人即可共享！');
                closeShareModal();
            } catch (e) {
                // Fallback
                document.getElementById('share-link').select();
                document.execCommand('copy');
                showToast('✅ 链接已复制！');
                closeShareModal();
            }
        };

        // --- 云存储 API ---
        
        // 创建新的存储
        const createBin = async () => {
            const response = await fetch(`${API_BASE}/data`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    workData: {},
                    pricePerSession: 150,
                    lastSync: new Date().toISOString()
                })
            });
            
            if (!response.ok) throw new Error('创建存储失败');
            
            const data = await response.json();
            return data.id;
        };
        
        // 读取数据
        const loadFromCloud = async () => {
            if (!binId) return null;
            
            const response = await fetch(`${API_BASE}/data/${binId}`);
            if (!response.ok) {
                if (response.status === 404) return null;
                throw new Error('读取数据失败');
            }
            
            return await response.json();
        };
        
        // 保存数据
        const saveToCloud = async () => {
            if (!binId || isSyncing) return;
            
            isSyncing = true;
            updateSyncStatus('pending', '同步中...');
            
            try {
                const response = await fetch(`${API_BASE}/data/${binId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        workData: workData,
                        pricePerSession: pricePerSession,
                        lastSync: new Date().toISOString()
                    })
                });
                
                if (!response.ok) throw new Error('保存失败');
                
                updateSyncStatus('success', '已同步');
            } catch (error) {
                console.error('同步失败:', error);
                updateSyncStatus('error', '同步失败');
                // 保存到本地作为备份
                localStorage.setItem('nanny_local_data', JSON.stringify({ workData, pricePerSession }));
            } finally {
                isSyncing = false;
            }
        };
        
        // 防抖同步
        const debouncedSync = () => {
            if (syncTimeout) clearTimeout(syncTimeout);
            updateSyncStatus('pending', '等待同步...');
            syncTimeout = setTimeout(saveToCloud, 1500);
        };
        
        // 刷新数据
        window.refreshData = async () => {
            updateSyncStatus('pending', '刷新中...');
            try {
                const data = await loadFromCloud();
                if (data) {
                    workData = data.workData || {};
                    if (data.pricePerSession) {
                        pricePerSession = data.pricePerSession;
                        document.getElementById('price-input').value = pricePerSession;
                    }
                    renderCalendar();
                    updateStats();
                    updateSyncStatus('success', '已同步');
                    showToast('✅ 数据已刷新');
                }
            } catch (error) {
                updateSyncStatus('error', '刷新失败');
                showToast('❌ 刷新失败，请重试');
            }
        };

        // --- 业务逻辑 ---

        // 初始化
        async function init() {
            // 先尝试从本地恢复数据（保证页面快速显示）
            const localData = localStorage.getItem('nanny_local_data');
            if (localData) {
                try {
                    const parsed = JSON.parse(localData);
                    workData = parsed.workData || {};
                    pricePerSession = parsed.pricePerSession || 150;
                    document.getElementById('price-input').value = pricePerSession;
                } catch(e) {}
            }
            
            // 先渲染页面
            renderCalendar();
            updateStats();
            
            try {
                // 1. 从 URL 获取 bin ID，或从 localStorage 恢复
                const urlParams = new URLSearchParams(window.location.search);
                binId = urlParams.get('id') || localStorage.getItem('nanny_bin_id');
                
                // 2. 如果没有 ID，创建新的存储
                if (!binId) {
                    updateSyncStatus('pending', '初始化...');
                    binId = await createBin();
                    localStorage.setItem('nanny_bin_id', binId);
                    // 更新 URL（不刷新页面）
                    const newUrl = `${window.location.pathname}?id=${binId}`;
                    window.history.replaceState({}, '', newUrl);
                    showToast('✅ 已创建云存储，点击分享按钮邀请家人');
                } else {
                    // 保存到 localStorage（方便下次访问）
                    localStorage.setItem('nanny_bin_id', binId);
                    // 确保 URL 包含 ID
                    if (!urlParams.get('id')) {
                        const newUrl = `${window.location.pathname}?id=${binId}`;
                        window.history.replaceState({}, '', newUrl);
                    }
                }
                
                // 3. 从云端加载数据
                const cloudData = await loadFromCloud();
                if (cloudData && cloudData.workData) {
                    workData = cloudData.workData;
                    if (cloudData.pricePerSession) {
                        pricePerSession = cloudData.pricePerSession;
                        document.getElementById('price-input').value = pricePerSession;
                    }
                    // 同步到本地
                    localStorage.setItem('nanny_local_data', JSON.stringify({ workData, pricePerSession }));
                }
                
                // 4. 重新渲染
                renderCalendar();
                updateStats();
                updateSyncStatus('success', '已同步');
                
            } catch (error) {
                console.error('初始化失败:', error);
                updateSyncStatus('error', '离线模式');
                showToast('⚠️ 网络异常，已切换到离线模式');
            }
        }

        // 修改价格
        window.updatePrice = (val) => {
            pricePerSession = parseInt(val) || 0;
            updateStats();
            renderMonthlyStats();
            debouncedSync();
        };

        // 切换状态 (核心功能)
        window.toggleSlot = (dateStr, type, btnElement) => {
            const key = `${dateStr}-${type}`;
            const isActive = !workData[key];
            
            // 更新内存
            workData[key] = isActive;
            
            // 触发云同步
            debouncedSync();
            
            // 本地备份
            localStorage.setItem('nanny_local_data', JSON.stringify({ workData, pricePerSession }));

            // 更新 UI 样式
            if (isActive) {
                btnElement.classList.remove('slot-inactive');
                btnElement.classList.add('slot-active');
            } else {
                btnElement.classList.remove('slot-active');
                btnElement.classList.add('slot-inactive');
            }

            // 更新统计
            updateStats();
            const monthIndex = parseInt(dateStr.split('-')[1]) - 1;
            updateMonthStat(monthIndex);
        };

        // 计算并更新全局统计
        function updateStats() {
            let count = 0;
            for (let key in workData) {
                if (workData[key] === true) count++;
            }
            const total = count * pricePerSession;
            
            document.getElementById('total-year-income').innerText = `¥ ${total.toLocaleString()}`;
            document.getElementById('total-year-count').innerText = count;
        }

        // 更新单月统计
        function updateMonthStat(monthIndex) {
            const monthStr = String(monthIndex + 1).padStart(2, '0');
            let count = 0;
            for (let d = 1; d <= 31; d++) {
                const dayStr = String(d).padStart(2, '0');
                const dateStr = `${YEAR}-${monthStr}-${dayStr}`;
                if (workData[`${dateStr}-am`]) count++;
                if (workData[`${dateStr}-pm`]) count++;
            }
            const total = count * pricePerSession;
            const el = document.getElementById(`month-total-${monthIndex}`);
            if (el) el.innerText = `¥${total}`;
        }

        function renderMonthlyStats() {
            for(let i=0; i<12; i++) updateMonthStat(i);
        }

        // 渲染日历网格
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];

            for (let m = 0; m < 12; m++) {
                const daysInMonth = new Date(YEAR, m + 1, 0).getDate();
                const startDay = new Date(YEAR, m, 1).getDay();

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden flex flex-col";

                card.innerHTML = `
                    <div class="px-4 py-3 border-b border-slate-50 flex justify-between items-baseline bg-slate-50/50">
                        <h3 class="font-bold text-slate-700">${monthNames[m]}</h3>
                        <div class="text-xs font-mono text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded font-bold" id="month-total-${m}">¥0</div>
                    </div>
                    <div class="p-4 flex-1">
                        <div class="grid grid-cols-7 mb-2 text-center">
                            ${['日','一','二','三','四','五','六'].map(d => `<span class="text-[10px] text-slate-400 font-medium">${d}</span>`).join('')}
                        </div>
                        <div class="grid grid-cols-7 gap-y-3 gap-x-1" id="days-container-${m}"></div>
                    </div>
                `;
                
                grid.appendChild(card);
                
                const daysContainer = document.getElementById(`days-container-${m}`);

                for (let i = 0; i < startDay; i++) {
                    const empty = document.createElement('div');
                    daysContainer.appendChild(empty);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${YEAR}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    
                    const isAmActive = !!workData[`${dateStr}-am`];
                    const isPmActive = !!workData[`${dateStr}-pm`];

                    const dayWrapper = document.createElement('div');
                    dayWrapper.className = "flex flex-col items-center group";
                    
                    dayWrapper.innerHTML = `
                        <span class="text-[10px] text-slate-400 mb-1 font-medium">${d}</span>
                        <div class="flex w-full max-w-[40px] h-6 rounded-md overflow-hidden border border-slate-100 shadow-sm cursor-pointer">
                            <button 
                                onclick="toggleSlot('${dateStr}', 'am', this)"
                                class="slot-btn flex-1 h-full flex items-center justify-center text-[8px] font-bold ${isAmActive ? 'slot-active' : 'slot-inactive'}"
                            >上</button>
                            <div class="w-px bg-white/20 z-10 relative"></div>
                            <button 
                                onclick="toggleSlot('${dateStr}', 'pm', this)"
                                class="slot-btn flex-1 h-full flex items-center justify-center text-[8px] font-bold ${isPmActive ? 'slot-active' : 'slot-inactive'}"
                            >下</button>
                        </div>
                    `;
                    daysContainer.appendChild(dayWrapper);
                }
            }
            
            renderMonthlyStats();
        }

        // 启动
        init();
    </script>
</body>
</html>
